<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Motor 1999/2026 - Inicialização</title>
    <style>
        /* =========================================
           1. SETUP BASE E RESPONSIVIDADE 16:9
           ========================================= */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            height: 100%; width: 100%;
            background-color: #1a1a1a;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        .game-container {
            position: relative;
            /* O Segredo da Responsividade Fixa */
            aspect-ratio: 16 / 20;
            width: 100%;
            max-height: 100vh;
            max-width: calc(100vh * (16 / 20)); /* Trava a largura para não quebrar o 16:9 */
            background-color: #000;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.9); /* Destaca o jogo do fundo do navegador */
        }


        /* Classes utilitárias de transição */
        .oculto { display: none !important; }
        .fade-in { animation: fadeIn 1s forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* =========================================
           ATO 1: O TERMINAL
           ========================================= */
        #ato1-terminal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('static/img/terminal_bg.gif') center/cover no-repeat;
            z-index: 10;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .terminal-input-wrapper {
            margin-top: 15%; /* Ajuste conforme o espaço vazio do seu GIF */
            display: flex; align-items: center;
        }

        .terminal-prompt {
            color: #00ff00; font-family: 'Courier New', Courier, monospace;
            font-size: 2rem; margin-right: 10px; text-shadow: 0 0 5px #00ff00;
        }

        #nome-jogador {
            background: transparent; border: none; outline: none;
            color: #00ff00; font-family: 'Courier New', Courier, monospace;
            font-size: 2rem; width: 300px; text-transform: uppercase;
            text-shadow: 0 0 5px #00ff00;
        }

        /* =========================================
           ATO 2: O VHS
           ========================================= */
        #ato2-vhs {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('static/img/terminal_bg.gif') center/cover no-repeat;
            z-index: 20;
        }

        /* =========================================
           ATO 3: A APRESENTAÇÃO DO ELENCO
           ========================================= */
        #ato3-elenco {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('../static/img/terminal_bg.png') center/cover no-repeat;
            z-index: 30;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
        }

        #elenco-imagem {
            max-height: 55%;
            object-fit: contain;
            margin-bottom: -20px; /* Faz o personagem sobrepor a caixa levemente */
            z-index: 2;
        }

        .ui-layer {
            width: 100%; height: 45%;
            background-color: rgba(12, 22, 45, 0.90);
            border-top: 4px solid #ffcc00;
            display: flex; flex-direction: column; padding: 30px;
            z-index: 10;
            color: #f1f1f1;
            text-align: center;
            box-shadow: 0 -10px 25px rgba(0,0,0,0.7);
        }

        .elenco-titulo {
            font-size: 1.4rem; color: #ffcc00; margin-bottom: 14px; text-transform: uppercase;
        }
        .elenco-texto {
            font-size: 1.1rem; line-height: 1.6; white-space: pre-wrap; margin-bottom: 20px;
        }

        .btn-avancar {
            align-self: center; background-color: transparent; color: #ffcc00;
            border: 2px solid #ffcc00; padding: 10px 30px; font-size: 1rem;
            cursor: pointer; transition: 0.1s; text-transform: uppercase; border-radius: 4px;
        }
        .btn-avancar:hover { background-color: #ffcc00; color: #000; font-weight: bold; font-size: 1rem; }
    </style>
</head>
<body>

<div class="game-container">
    <div id="ato1-terminal">
        <div class="terminal-input-wrapper">
            <span class="terminal-prompt">LOGIN:</span>
            <input type="text" id="nome-jogador" autocomplete="off" autofocus maxlength="15">
        </div>
    </div>

    <div id="ato2-vhs" class="oculto"></div>

    <div id="ato3-elenco" class="oculto">
        <img id="elenco-imagem" src="" class="oculto">
        <div class="ui-layer">
            <h2 id="elenco-titulo" class="elenco-titulo"></h2>
            <div id="elenco-texto" class="elenco-texto"></div>
            <button class="btn-avancar" onclick="avancarApresentacao()">Continuar</button>
        </div>
    </div>
</div>

<script>
    // ESTADO DA INTRO
    let nomeDigitado = "";
    let slideAtual = 0;

    // O ARRAY DE APRESENTAÇÃO (A Máquina de Estados do Ato 3)
    const roteiroIntro = [
        {
            imagem: null,
            titulo: "A LOCADORA",
            texto: "Você é o Gerente. O cérebro da operação. Seu trabalho parece simples: alugar filmes, cobrar multas por atraso e garantir que a porta de aço continue abrindo no dia seguinte.\n\nMas uma locadora não é feita apenas de plástico e fita magnética. Ela é feita de pessoas. E para sobreviver ao fim do milênio, você terá que gerenciar o ego, os medos e as exigências da sua equipe. Se você falhar, as engrenagens param. E se a engrenagem parar, a falência é o seu destino."
        },
        {
            imagem: "/static/img/mauricio.png",
            titulo: "🎬 Maurício (O Guardião do Acervo)",
            texto: "\"Tira esse salgadinho de perto do meu Kubrick!\"\n\nA Função: Curador e organizador da loja. Ele sabe a diferença entre o corte do diretor e a versão de cinema de qualquer filme obscuro.\nA Mecânica: Representa a barra de Integridade do Acervo. Se você sacrificar o respeito aos filmes por dinheiro rápido, ele surta e sua locadora virará um camelô sem alma."
        },
        {
            imagem: "/static/img/leila.png",
            titulo: "💥 Leila (O Motor da Tração)",
            texto: "\"Chefe, e se a gente botar uma caixa de som na calçada e dar pipoca de graça?\"\n\nA Função: Atendente e gênio do marketing de guerrilha. É a ponte com os jovens e entende como atrair movimento.\nA Mecânica: Representa a barra de Tração e Hype. Se focar apenas em cortar gastos, a loja cai no esquecimento e ela procura um emprego onde o futuro esteja acontecendo."
        },
        {
            imagem: "/static/img/vagner.png",
            titulo: "💼 Vagner (O Escudo Burocrático)",
            texto: "\"Cadê a nota fiscal disso? Se a prefeitura bater aqui, eu não vou preso sozinho!\"\n\nA Função: O caixa, dono, torcedor fanático do Vitória e gerente financeiro informal. É o cara que conta as moedas, paga a conta de luz, lida com alvarás vencidos e tenta manter a loja operando fora do radar da fiscalização."
        },
        {
            imagem: "/static/img/gerente.png",
            titulo: "O GERENTE",
            texto: "" // Será preenchido dinamicamente com o nome no JS
        }
    ];

    // =========================================
    // GATILHO DO ATO 1: PRESSIONAR ENTER NO TERMINAL
    // =========================================
    let transicaoIniciada = false; // Flag para impedir múltiplos disparos

    document.getElementById("nome-jogador").addEventListener("keydown", function(event) {
        if (event.key === "Enter") {
            // 1. OBRIGA o navegador a não fazer NADA nativamente (não recarregar, não enviar form)
            event.preventDefault();

            // 2. Se a transição já começou, ignora apertões extras no Enter
            if (transicaoIniciada) return;

            const inputVal = this.value.trim().toUpperCase();

            if (inputVal.length > 0) {
                transicaoIniciada = true; // Trava ativada
                nomeDigitado = inputVal;

                // 3. Desabilita o campo de texto para o jogador não digitar mais nada
                this.disabled = true;

                iniciarTransicaovhs();
            }
        }
    });
    // =========================================
    // ATO 2: RODA O VHS E SINCRONIZA COM BACKEND
    // =========================================
    function iniciarTransicaovhs() {
        document.getElementById("ato1-terminal").classList.add("oculto");
        document.getElementById("ato2-vhs").classList.remove("oculto");

        // Dispara o POST silencioso para o Python salvar a sessão
        fetch('/api/iniciar-sessao', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nome: nomeDigitado })
        }).catch(err => console.error("Erro ao salvar nome no backend:", err));

        // Timer exato do seu GIF de VHS (5000ms = 5 segundos)
        setTimeout(() => {
            iniciarApresentacao();
        }, 2500);
    }

    // =========================================
    // ATO 3: RENDERIZA O CARROSSEL
    // =========================================
    function iniciarApresentacao() {
        document.getElementById("ato2-vhs").classList.add("oculto");
        const containerAto3 = document.getElementById("ato3-elenco");
        containerAto3.classList.remove("oculto");
        containerAto3.classList.add("fade-in");

        // Configura o último slide (Gerente) dinamicamente com o nome do jogador
        roteiroIntro[4].texto = `Bem-vindo à linha de frente, ${nomeDigitado}. O destino da locadora está em suas mãos. Que comece o expediente.`;

        renderizarSlide();
    }

    function renderizarSlide() {
        const slide = roteiroIntro[slideAtual];
        const imgElenco = document.getElementById("elenco-imagem");

        if (slide.imagem) {
            imgElenco.src = slide.imagem;
            imgElenco.classList.remove("oculto");
        } else {
            imgElenco.classList.add("oculto");
        }

        document.getElementById("elenco-titulo").innerText = slide.titulo;
        document.getElementById("elenco-texto").innerText = slide.texto;
    }

    function avancarApresentacao() {
        slideAtual++;
        if (slideAtual < roteiroIntro.length) {
            renderizarSlide();
        } else {
            // FIM DA INTRO: Redireciona para o jogo real
            window.location.href = "/jogo";
        }
    }
</script>

</body>
</html>
