version: '3.8'

services:
  # 1. O Servidor da Inteligência Artificial
  ollama:
    image: ollama/ollama:latest
    container_name: locadora_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  # 2. O Instalador do Modelo (Roda uma vez e desliga)
  ollama-init:
    image: ollama/ollama:latest
    container_name: locadora_ollama_init
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=ollama:11434
    entrypoint: /bin/sh
    # Espera 5 segundos para o servidor subir e então baixa o modelo phi3
    command: -c "sleep 5 && echo 'Baixando modelo phi3...' && ollama pull phi3 && echo 'Modelo pronto!'"

volumes:
  ollama_data:
    name: locadora_ollama_data