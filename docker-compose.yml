version: '3.8'

services:
  # 1. O Servidor da Inteligência Artificial (Ollama)
  ollama:
    image: ollama/ollama:latest
    container_name: locadora_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    environment:
      # opcional: ajuste se necessário
      - OLLAMA_HOST=0.0.0.0:11434

  # 2. O Instalador do Modelo (Roda uma vez e desliga)
  ollama-init:
    image: ollama/ollama:latest
    container_name: locadora_ollama_init
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=ollama:11434
    entrypoint: /bin/sh
    # Espera o servidor subir e então baixa o modelo qwen2.5
    command: -c "sleep 6 && echo 'Baixando modelo qwen2.5-instruct...' && ollama pull qwen2.5-instruct && echo 'Modelo qwen2.5-instruct pronto!'"
    restart: "no"

volumes:
  ollama_data:
    name: locadora_ollama_data
